<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ROI Calculator — CalcVerse</title><meta name="description" content="Calculate return on investment, annualized ROI, total gain/loss, and compare against benchmarks."/><script>(function(){const t=localStorage.getItem('cv-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.classList.toggle('dark',t==='dark')})();</script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/><link rel="stylesheet" href="/assets/css/main.css"/><link rel="stylesheet" href="/assets/css/calculator.css"/><link rel="stylesheet" href="/assets/css/themes.css"/><link href="/assets/css/output.css" rel="stylesheet"/></head>
<body>
<div id="sidebar-container"></div>
<button id="mobile-menu-toggle" class="fixed top-4 left-4 z-50 btn-icon lg:hidden"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<main class="ml-0 md:ml-16 lg:ml-64 transition-all duration-300 ease-out min-h-screen" id="main-content">
<header class="sticky top-0 z-20 glass border-b border-gray-200 dark:border-gray-800"><div class="flex items-center justify-end px-6 h-16 gap-2"><button class="btn-icon" id="btn-keyboard-help"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M6 16h12"/></svg></button><button class="btn-icon" id="theme-toggle-calc"><span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span></button></div></header>
<div class="calc-page" id="calc-app">
<nav class="breadcrumb"><a href="/app/dashboard.html">Dashboard</a><span class="breadcrumb-separator">/</span><a href="/app/dashboard.html" id="breadcrumb-category">Finance</a><span class="breadcrumb-separator">/</span><span id="breadcrumb-name">ROI Calculator</span></nav>
<div class="calc-header"><div><span class="calc-category-badge">Finance</span><h1 class="calc-title">ROI Calculator</h1><p class="calc-description">Calculate return on investment, annualized ROI, and total gain/loss.</p></div>
<div class="calc-actions"><button class="btn-ghost" id="btn-favorite" data-calc-id="fin-roi"><span>☆</span> <span class="hidden sm:inline">Favorite</span></button><button class="btn-ghost" id="btn-share"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg><span class="hidden sm:inline">Share</span></button><button class="btn-ghost" id="btn-formula"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="hidden sm:inline">Formula</span></button></div></div>
<div class="calc-body" id="calc-body">
<div class="calc-display-panel" id="calc-left">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
<div class="input-group"><label class="input-label" for="roi-initial">Initial Investment ($)</label><input type="number" class="input-field font-mono" id="roi-initial" value="10000" step="500"/></div>
<div class="input-group"><label class="input-label" for="roi-final">Final Value ($)</label><input type="number" class="input-field font-mono" id="roi-final" value="15000" step="500"/></div>
<div class="input-group"><label class="input-label" for="roi-years">Time Period (years)</label><input type="number" class="input-field font-mono" id="roi-years" value="3" min="0.5" step="0.5"/></div></div>
<button class="btn-primary w-full" id="btn-roi-calc">Calculate</button>
<div id="roi-preview" class="mt-4"></div></div>
<div class="calc-form-box" id="calc-right"><h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-3">Results</h3>
<div id="roi-result"><p class="text-sm text-gray-400 italic">Enter values and click Calculate.</p></div></div></div>
<details class="calc-formula-box"><summary>How it's calculated</summary><div class="formula-content"><p class="text-gray-500 dark:text-gray-400">ROI = (Final − Initial) / Initial × 100%<br/>Annualized ROI = (Final/Initial)<sup>1/t</sup> − 1</p></div></details>
<div class="related-calcs"><h3>Related Calculators</h3><div class="flex gap-4 overflow-x-auto pb-2 scrollbar-none" id="related-list"></div></div></div></main>
<script src="/assets/js/core/storage.js"></script><script src="/assets/js/core/theme.js"></script><script src="/assets/js/core/search.js"></script><script src="/assets/js/core/router.js"></script><script src="/assets/js/components/sidebar.js"></script><script src="/assets/js/components/toast.js"></script><script src="/assets/js/components/modal.js"></script><script src="/assets/js/engines/finance-engine.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
const sidebar=new CalcVerseSidebar('#sidebar-container',{collapsed:window.innerWidth<1024});window.calcSidebar=sidebar;
window.themeEngine=themeEngine;document.getElementById('theme-toggle-calc')?.addEventListener('click',()=>themeEngine.toggle());
const CALC={id:'fin-roi',name:'ROI Calculator',category:'Finance',categoryPath:'/app/dashboard.html',description:'Calculate return on investment.',icon:'📊',related:[{id:'fin-margin',name:'Profit Margin',icon:'📈',category:'Finance',path:'/app/finance/profit-margin.html'},{id:'fin-compound',name:'Compound Interest',icon:'📈',category:'Finance',path:'/app/finance/compound-interest.html'},{id:'fin-npv',name:'NPV / DCF',icon:'📉',category:'Finance',path:'/app/finance/npv.html'},{id:'fin-crypto',name:'Crypto P&L',icon:'₿',category:'Finance',path:'/app/finance/crypto.html'}]};
document.getElementById('breadcrumb-category').textContent=CALC.category;document.getElementById('breadcrumb-category').href=CALC.categoryPath;document.getElementById('breadcrumb-name').textContent=CALC.name;document.getElementById('btn-favorite').dataset.calcId=CALC.id;document.title=CALC.name+' — CalcVerse';sidebar.setActive(CALC.id);CalcStorage.recordVisit(CALC.id,CALC.name);
const favBtn=document.getElementById('btn-favorite');function ufb(){const f=CalcStorage.isFavorite(CALC.id);favBtn.innerHTML=f?'<span>★</span> <span class="hidden sm:inline">Favorited</span>':'<span>☆</span> <span class="hidden sm:inline">Favorite</span>';favBtn.classList.toggle('text-primary',f)}
favBtn?.addEventListener('click',()=>{CalcStorage.toggleFavorite(CALC.id);ufb();Toast.show(CalcStorage.isFavorite(CALC.id)?'Added to favorites ⭐':'Removed from favorites',CalcStorage.isFavorite(CALC.id)?'success':'info')});ufb();document.addEventListener('cv:favorites-update',ufb);
document.getElementById('btn-share')?.addEventListener('click',()=>{if(navigator.share)navigator.share({title:CALC.name,text:CALC.description,url:window.location.href});else{navigator.clipboard.writeText(window.location.href);Toast.show('Link copied!','success')}});
document.getElementById('btn-formula')?.addEventListener('click',()=>Modal.showFormula(CALC.name,'ROI = (Final − Initial) / Initial × 100%',CALC.description,{'Initial':'Investment amount','Final':'Final value'}));
document.getElementById('btn-keyboard-help')?.addEventListener('click',()=>Modal.show({title:'⌨️ Shortcuts',content:'<p class="text-sm text-gray-500">Tab between inputs. Enter to calculate.</p>'}));
document.getElementById('mobile-menu-toggle')?.addEventListener('click',()=>{window.innerWidth<768?sidebar.show():sidebar.toggle()});
let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{window.innerWidth<1024?sidebar.collapse():sidebar.expand()},150)});
const fmt$=n=>FinanceEngine.formatCurrency(n);
function calculate(){const i=parseFloat(document.getElementById('roi-initial').value);const f=parseFloat(document.getElementById('roi-final').value);const y=parseFloat(document.getElementById('roi-years').value);if(isNaN(i)||isNaN(f)||isNaN(y)||i<=0||f<0||y<=0)return;const roi=FinanceEngine.roi(i,f);const aroi=FinanceEngine.annualizedRoi(i,f,y);const gain=f-i;const spComp=FinanceEngine.compoundInterest(i,10,1,y);document.getElementById('roi-result').innerHTML=`<div class="p-4 rounded-xl bg-primary/8 border border-primary/20"><div class="grid grid-cols-2 gap-4"><div><div class="text-xs text-gray-400">Total ROI</div><div class="text-2xl font-bold font-mono ${roi>=0?'text-primary':'text-red-500'}">${roi>=0?'+':''}${roi.toFixed(2)}%</div></div><div><div class="text-xs text-gray-400">Annualized ROI</div><div class="text-2xl font-bold font-mono ${aroi>=0?'text-primary':'text-red-500'}">${aroi>=0?'+':''}${aroi.toFixed(2)}%</div></div></div><div class="grid grid-cols-2 gap-3 mt-4"><div class="p-3 rounded-lg bg-gray-50 dark:bg-black/30 text-center"><div class="text-xs text-gray-400">Total Gain/Loss</div><div class="text-lg font-mono font-bold ${gain>=0?'text-primary':'text-red-500'}">${gain>=0?'+':''}${fmt$(gain)}</div></div><div class="p-3 rounded-lg bg-gray-50 dark:bg-black/30 text-center"><div class="text-xs text-gray-400">vs S&P 500 (10%)</div><div class="text-lg font-mono font-bold text-gray-800 dark:text-gray-200">${fmt$(spComp)}</div></div></div></div>`;CalcStorage.addHistory(CALC.id,{expression:`ROI: ${fmt$(i)} → ${fmt$(f)}`,result:`${roi.toFixed(1)}%`})}
document.getElementById('btn-roi-calc').addEventListener('click',calculate);calculate();
const rl=document.getElementById('related-list');rl.innerHTML=CALC.related.map(r=>`<a href="${r.path}" class="card-hover p-4 min-w-[160px] shrink-0"><div class="text-xl mb-1">${r.icon||'🔢'}</div><h4 class="font-semibold text-sm text-gray-900 dark:text-gray-100">${r.name}</h4><p class="text-xs text-gray-400 mt-0.5">${r.category}</p></a>`).join('');
});
</script></body></html>
